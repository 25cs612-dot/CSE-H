<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
    <style>
        body {
            font-family: Arial;
        }
        form {
            width: 300px;
            margin: auto;
            border: 1px solid black;
            padding: 15px;
        }
        input, select {
            width: 100%;
            margin: 5px 0;
        }
    </style>
</head>

<body>

<form>
    <h3>Student Registration</h3>

    Name:
    <input type="text"><br>

    Email:
    <input type="email"><br>

    Phone:
    <input type="text"><br>

    Gender:
    <input type="radio" name="g"> Male
    <input type="radio" name="g"> Female<br><br>

    Course:
    <select>
        <option>BCA</option>
        <option>BSc</option>
        <option>BCom</option>
    </select><br><br>

    <input type="submit" value="Register">
</form>

</body>
</html>
